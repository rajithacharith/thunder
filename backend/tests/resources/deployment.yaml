server:
  hostname: localhost
  port: 8080

tls:
  cert_file: /path/to/cert.pem
  key_file: /path/to/key.pem

database:
  config:
    type: postgres
    postgres:
      hostname: localhost
      port: 5432
      name: configdb
      username: postgres
      password: postgres
      sslmode: disable

  runtime:
    type: sqlite
    sqlite:
      path: "/data/runtime.db"
      options: "cache=shared"

oauth:
  jwt:
    issuer: thunder
    validity_period: 3600

flow:
  max_version_history: 3
