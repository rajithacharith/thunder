# React SDK Sample Application
# Sample React application using Thunder React SDK
id: "react-sdk-sample"
name: "React SDK Sample"
description: "Sample React application using Thunder React SDK"
url: "https://localhost:3000"
logo_url: "https://localhost:3000/logo.png"
tos_uri: "https://localhost:3000/terms"
policy_uri: "https://localhost:3000/privacy"
contacts:
  - "admin@example.com"
is_registration_flow_enabled: false
allowed_user_types:
  - "Customer"
user_attributes:
  - "given_name"
  - "family_name"
  - "email"
  - "groups"
  - "name"

assertion:
  validity_period: 3600
  user_attributes: []

certificate:
  type: "NONE"
  value: ""

inbound_auth_config:
  - type: "oauth2"
    config:
      client_id: "REACT_SDK_SAMPLE"
      redirect_uris:
        - "https://localhost:3000"
        - "https://localhost:3000/callback"
        - "http://localhost:3000"
        - "http://localhost:3000/callback"
      grant_types:
        - "authorization_code"
      response_types:
        - "code"
      token_endpoint_auth_method: "none"
      pkce_required: true
      public_client: true
      token:
        access_token:
          validity_period: 3600
          user_attributes:
            - "given_name"
            - "family_name"
            - "email"
            - "groups"
            - "name"
        id_token:
          validity_period: 3600
          user_attributes:
            - "given_name"
            - "family_name"
            - "email"
            - "groups"
            - "name"
      scope_claims:
        email:
          - "email"
          - "email_verified"
        group:
          - "groups"
        phone:
          - "phone_number"
          - "phone_number_verified"
        profile:
          - "name"
          - "given_name"
          - "family_name"
          - "picture"
