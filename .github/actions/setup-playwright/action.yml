name: Setup Playwright Browsers
description: Caches and installs Playwright Chromium browser for the workspace.

inputs:
  working-directory:
    description: Directory to run playwright install from. Use the package directory to ensure the correct playwright version is resolved (e.g. tests/e2e).
    required: false
    default: '.'
  browsers:
    description: Space-separated list of browsers to install (e.g. "chromium firefox webkit"). Defaults to all browsers defined in the playwright config.
    required: false
    default: ''
  scope:
    description: Cache scope label to distinguish cache entries (e.g. "packages" or "e2e").
    required: false
    default: 'root'

runs:
  using: composite
  steps:
    - name: 🎭 Restore Playwright Cache
      id: playwright-cache
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ inputs.scope }}-${{ hashFiles('pnpm-lock.yaml') }}

    - name: 🎭 Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm exec playwright install --with-deps ${{ inputs.browsers }}

    - name: 🎭 Save Playwright Cache
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ inputs.scope }}-${{ hashFiles('pnpm-lock.yaml') }}
