openapi: 3.0.3

info:
  title: Health Check API
  version: 0.1.0
  description: This API is used to retrieve health status of the server including readiness and liveness checks.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: https://{host}:{port}
    variables:
      host:
        default: "localhost"
      port:
        default: "8090"

tags:
  - name: health
    description: Health check operations

paths:
  /health/liveness:
    get:
      tags:
        - health
      summary: Liveness Check
      responses:
        '200':
          description: OK
        '503':
          description: Service Unavailable

  /health/readiness:
    get:
      tags:
        - health
      summary: Readiness check
      description: Returns OK if the service is ready to accept traffic.
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              example:
                status: "UP"
                serviceStatus:
                  - serviceName: "ConfigDB"
                    status: "UP"
                  - serviceName: "RuntimeDB"
                    status: "UP"
                  - serviceName: "UserDB"
                    status: "UP"
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              example:
                status: "DOWN"
                serviceStatus:
                  - serviceName: "ConfigDB"
                    status: "DOWN"
                  - serviceName: "RuntimeDB"
                    status: "UP"
                  - serviceName: "UserDB"
                    status: "UP"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum:
            - UP
            - DOWN
            - UNKNOWN
        serviceStatus:
          type: array
          items:
            type: object
            properties:
              serviceName:
                type: string
                enum:
                  - ConfigDB
                  - RuntimeDB
                  - UserDB
              status:
                type: string
                enum:
                - UP
                - DOWN
                - UNKNOWN
