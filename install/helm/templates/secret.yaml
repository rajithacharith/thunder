{{- $configuration := default dict .Values.configuration -}}
{{- $database := default dict $configuration.database -}}
{{- $config := default dict $database.config -}}
{{- $runtime := default dict $database.runtime -}}
{{- $user := default dict $database.user -}}
{{- $configPostgres := default dict $config.postgres -}}
{{- $runtimePostgres := default dict $runtime.postgres -}}
{{- $runtimeRedis := default dict $runtime.redis -}}
{{- $userPostgres := default dict $user.postgres -}}
{{- $consent := default dict $configuration.consent -}}
{{- $consentDb := default dict $consent.database -}}
{{- $cache := default dict $configuration.cache -}}
{{- $redis := default dict $cache.redis -}}

{{- $configPassword := "" }}
{{- $runtimePassword := "" }}
{{- $runtimeRedisPassword := "" }}
{{- $userPassword := "" }}
{{- $consentPassword := "" }}
{{- $redisPassword := "" }}

{{- if and $configPostgres.password (not (default dict $configPostgres.passwordRef).key) }}
  {{- $configPassword = $configPostgres.password }}
{{- end }}
{{- if and $runtimePostgres.password (not (default dict $runtimePostgres.passwordRef).key) }}
  {{- $runtimePassword = $runtimePostgres.password }}
{{- end }}
{{- if and $runtimeRedis.password (not (default dict $runtimeRedis.passwordRef).key) }}
  {{- $runtimeRedisPassword = $runtimeRedis.password }}
{{- end }}
{{- if and $userPostgres.password (not (default dict $userPostgres.passwordRef).key) }}
  {{- $userPassword = $userPostgres.password }}
{{- end }}
{{- if and $consent.enabled $consentDb.password (not (default dict $consentDb.passwordRef).key) }}
  {{- $consentPassword = $consentDb.password }}
{{- end }}
{{- if and (eq $cache.type "redis") $redis.password (not (default dict $redis.passwordRef).key) }}
  {{- $redisPassword = $redis.password }}
{{- end }}

{{- $createSecret := or $configPassword $runtimePassword $runtimeRedisPassword $userPassword $consentPassword $redisPassword}}

{{- if $createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-db-credentials" (include "thunder.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thunder.labels" . | nindent 4 }}
    app.kubernetes.io/component: database-credentials
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    # Use a lower weight than other pre-install/pre-upgrade hooks (e.g., -5 or default 0)
    # so this secret is created before dependent resources that consume these credentials.
    "helm.sh/hook-weight": "-6"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
data:
  {{- if $configPassword }}
  config-db-password: {{ $configPassword | b64enc | quote }}
  {{- end }}
  {{- if $runtimePassword }}
  runtime-db-password: {{ $runtimePassword | b64enc | quote }}
  {{- end }}
  {{- if $runtimeRedisPassword }}
  runtime-redis-password: {{ $runtimeRedisPassword | b64enc | quote }}
  {{- end }}
  {{- if $userPassword }}
  user-db-password: {{ $userPassword | b64enc | quote }}
  {{- end }}
  {{- if $consentPassword }}
  consent-db-password: {{ $consentPassword | b64enc | quote }}
  {{- end }}
  {{- if $redisPassword }}
  cache-redis-password: {{ $redisPassword | b64enc | quote }}
  {{- end }}
{{- end }}
