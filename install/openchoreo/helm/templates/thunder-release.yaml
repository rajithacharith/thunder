# ComponentRelease and ReleaseBinding are post-install/post-upgrade hooks so they are
# applied after all other chart resources (including the ComponentType) are ready.
# before-hook-creation deletion policy ensures idempotent upgrades.

---
apiVersion: openchoreo.dev/v1alpha1
kind: ComponentRelease
metadata:
  name: {{ .Values.componentName }}-v1
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  owner:
    componentName: {{ .Values.componentName }}
    projectName: {{ .Values.organization.name }}
  componentType:
    kind: ComponentType
    name: deployment/thunder-idp
    spec:
      {{- include "thunder.componentTypeSpec" . | nindent 6 }}
  workload:
    container:
      image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
  componentProfile:
    parameters:
      initial:
        database:
          config:
            port: {{ .Values.database.port | quote }}
            sslmode: {{ .Values.database.config.sslmode | quote }}
          runtime:
            port: {{ .Values.database.port | quote }}
            sslmode: {{ .Values.database.runtime.sslmode | quote }}
          user:
            port: {{ .Values.database.port | quote }}
            sslmode: {{ .Values.database.user.sslmode | quote }}
        crypto:
          encryptionKey: {{ .Values.crypto.encryption.key | quote }}
      runtime:
        server:
          port: {{ .Values.thunder.server.port }}
        jwt:
          issuer: {{ .Values.jwt.issuer | quote }}
          validity: {{ .Values.jwt.validity }}
        oauth:
          refreshTokenValidity: {{ .Values.oauth.refresh_token_validity }}
        cache:
          size: {{ .Values.cache.size }}
          ttl: {{ .Values.cache.ttl }}
        consent:
          enabled: {{ .Values.consent.enabled }}
          baseUrl: {{ .Values.consent.baseUrl | quote }}
        imagePullPolicy: "IfNotPresent"
        console:
          clientBase: {{ .Values.console.clientBase | quote }}
          clientId: {{ .Values.console.clientId | quote }}
          scopes: {{ .Values.console.scopes | quote }}
        gate:
          clientBase: {{ .Values.gate.clientBase | quote }}

---
apiVersion: openchoreo.dev/v1alpha1
kind: ReleaseBinding
metadata:
  name: {{ .Values.componentName }}-v1-dev
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  owner:
    componentName: {{ .Values.componentName }}
    projectName: {{ .Values.organization.name }}
  environment: development
  releaseName: {{ .Values.componentName }}-v1
  state: Active
  componentTypeEnvironmentConfigs:
    replicas: {{ .Values.replicas }}
    configDbHostname: {{ .Values.database.host | quote }}
    configDbName: {{ .Values.database.config.database | quote }}
    configDbUsername: {{ .Values.database.config.username | quote }}
    configDbPassword: {{ .Values.database.config.password | quote }}
    runtimeDbHostname: {{ .Values.database.host | quote }}
    runtimeDbName: {{ .Values.database.runtime.database | quote }}
    runtimeDbUsername: {{ .Values.database.runtime.username | quote }}
    runtimeDbPassword: {{ .Values.database.runtime.password | quote }}
    userDbHostname: {{ .Values.database.host | quote }}
    userDbName: {{ .Values.database.user.database | quote }}
    userDbUsername: {{ .Values.database.user.username | quote }}
    userDbPassword: {{ .Values.database.user.password | quote }}
    serverPublicUrl: {{ .Values.serverPublicUrl | quote }}
    gateClientHostname: {{ .Values.gate.hostname | quote }}
    gateClientPort: {{ .Values.gate.port }}
    gateClientScheme: {{ .Values.gate.scheme | quote }}
    corsAllowedOrigins:
      {{- range .Values.cors.allowed_origins }}
      - {{ . | quote }}
      {{- end }}
