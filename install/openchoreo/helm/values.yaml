## Default values for thunder chart

# Core component configuration
componentName: thunder    # Base name for Component/Workload/Service resources
pipelineName: identity-platform-pipeline  # DeploymentPipeline name (used by platform templates)

# Container image configuration
image:
  repository: ghcr.io/asgardeo/thunder  # Thunder container image repository
  tag: "latest"                         # Image tag (use specific version tags in production)

# Thunder server configuration
thunder:
  server:
    port: 8090  # Port on which Thunder server will listen

# NOTE: The following section contains placeholder values in angle brackets (e.g., <DB_HOST>, <DB_USERNAME>, <DB_PASSWORD>).
# You MUST replace these placeholders with actual values before deploying to production.
# For development, you can use the provided example values.
# Example: database.host could be "postgres.default.svc.cluster.local" for in-cluster PostgreSQL
database:
  host: <DB_HOST>  # Required: Database hostname/FQDN (e.g., postgres.default.svc.cluster.local)
  port: 5432       # Database port (default: 5432 for PostgreSQL)
  config:
    database: thunderdb        # Config database name
    username: <DB_USERforNAME>    # Required: Database username for config DB
    password: <DB_PASSWORD>    # Required: Database password for config DB
    sslmode: disable           # SSL mode: disable, require, verify-ca, verify-full
  runtime:
    database: thunderdb       # Runtime database name
    username: <DB_USERNAME>   # Required: Database username for runtime DB (can be same as config)
    password: <DB_PASSWORD>   # Required: Database password for runtime DB (can be same as config)
    sslmode: disable          # SSL mode: disable, require, verify-ca, verify-full
  user:
    database: thunderdb       # User database name
    username: <DB_USERNAME>   # Required: Database username for user DB (can be same as config)
    password: <DB_PASSWORD>   # Required: Database password for user DB (can be same as config)
    sslmode: disable          # SSL mode: disable, require, verify-ca, verify-full
jwt:
  issuer: ""          # JWT token issuer identifier (derived from server URL if not set)
  validity: 3600      # JWT token validity in seconds (default: 1 hour)

oauth:
  refresh_token_validity: 86400  # Refresh token validity in seconds (default: 24 hours)

crypto:
  encryption:
    # WARNING: Replace the default key with a 32-byte (64 character) hex string in production deployments
    key: "file://repository/resources/security/crypto.key"

cache:
  type: "memory"      # Cache type: "memory" (in-memory cache)
  size: 10000        # Maximum number of cache entries
  ttl: 3600          # Time to live for cache entries in seconds (default: 1 hour)

cors:
  allowed_origins:   # List of allowed CORS origins for cross-origin requests
    - "https://thunder-gate.your-domain.com"  # Replace with your actual domain
    - "https://localhost:3000"                # Common development URL

# Thunder Gate client configuration (the frontend/gate service Thunder redirects to)
gate:
  hostname: <GATE_HOSTNAME>  # Required: Thunder Gate hostname (e.g. thunder-gate-development.openchoreoapis.localhost)
  port: 19080                # OpenChoreo gateway port
  scheme: http               # Connection scheme: http or https
  clientBase: "/gate"        # Base path for the Gate frontend app

# Thunder Console configuration
console:
  clientBase: "/console"     # Base path for the Console frontend app
  clientId: "CONSOLE"        # OAuth client ID registered for the Console app
  scopes: '["openid", "profile", "email"]'  # OAuth scopes for the Console app

# Thunder server public URL (used in gate/console config.js for the development environment)
# Pattern: http://<componentName>-development.openchoreoapis.localhost:19080
serverPublicUrl: "<SERVER_PUBLIC_URL>"
# serverPublicHostName: "<SERVER_PUBLIC_HOSTNAME>"  # Hostname part of the public URL (e.g., thunder-development.openchoreoapis.localhost)

# Consent server configuration
consent:
  enabled: false
  baseUrl: "http://localhost:9090/api/v1"

organization:
  name: identity-platform  # Organization name — used as the project name and namespace

# OpenChoreo data plane configuration
# The ClusterDataPlane resource is provisioned by the OpenChoreo platform installation.
# Use `kubectl get clusterdataplane` to list available data planes in your cluster.
dataPlane:
  name: default  # Name of the ClusterDataPlane resource to bind all environments to

replicas: 1  # Number of pod replicas per environment
