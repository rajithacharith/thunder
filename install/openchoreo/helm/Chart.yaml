apiVersion: v2
name: thunder
description: |
  Umbrella Helm chart for the Thunder Identity Provider on OpenChoreo.

  Sub-charts:
    thunder-oc-componenttype  — Registers the ComponentType (or ClusterComponentType) once
                             per cluster/namespace. Platform admins install this.
    thunder-component      — Deploys the Component, Workload, Release, and platform
                             resources for a Thunder instance. Teams install this.

  Install both together (default):
    helm install thunder .

  Install only the ComponentType:
    helm install thunder-type charts/thunder-oc-componenttype

  Install only the Component (assumes ComponentType already exists):
    helm install thunder-app charts/thunder-component -f my-values.yaml
type: application
version: 0.33.0
appVersion: "0.33.0"
dependencies:
  - name: thunder-oc-componenttype
    version: "0.33.0"
    repository: "file://charts/thunder-oc-componenttype"
    condition: thunder-oc-componenttype.enabled
  - name: thunder-component
    version: "0.33.0"
    repository: "file://charts/thunder-component"
    condition: thunder-component.enabled
