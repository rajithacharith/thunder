# Source: thunder/templates/thunder-component.yaml
apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: thunder
spec:
  owner:
    componentName: thunder
    projectName: identity-platform
  container:
    image: ghcr.io/asgardeo/thunder:latest
    command:
      - /bin/sh
      - -c
      - |
        # (The container startup script is preserved from the template, rendering DB host from env)
        cat > /opt/thunder/repository/conf/deployment.yaml << EOF
        server:
          hostname: ${THUNDER_SERVER_HOSTNAME}
          port: ${THUNDER_SERVER_PORT}

        gate_client:
          hostname: "${THUNDER_GATE_CLIENT_HOSTNAME}"
          port: ${THUNDER_GATE_CLIENT_PORT}
          scheme: "${THUNDER_GATE_CLIENT_SCHEME}"
          login_path: "/login"
          error_path: "/error"

        tls:
          min_version: "1.3"
          cert_file: "repository/resources/security/server.cert"
          key_file: "repository/resources/security/server.key"

        crypto:
          encryption:
            key: "${THUNDER_CRYPTO_ENCRYPTION_KEY}"

        database:
          config:
            type: "${THUNDER_DB_CONFIG_TYPE}"
            hostname: "${DATABASE_HOST}"
            port: ${DATABASE_PORT}
            name: "${THUNDER_DB_CONFIG_DATABASE}"
            username: "${THUNDER_DB_CONFIG_USERNAME}"
            password: "${THUNDER_DB_CONFIG_PASSWORD}"
            sslmode: "${THUNDER_DB_CONFIG_SSL_MODE}"
          runtime:
            type: "${THUNDER_DB_RUNTIME_TYPE}"
            hostname: "${DATABASE_HOST}"
            port: ${DATABASE_PORT}
            name: "${THUNDER_DB_RUNTIME_DATABASE}"
            username: "${THUNDER_DB_RUNTIME_USERNAME}"
            password: "${THUNDER_DB_RUNTIME_PASSWORD}"
            sslmode: "${THUNDER_DB_RUNTIME_SSL_MODE}"

        cache:
          disabled: false
          type: "${THUNDER_CACHE_TYPE}"
          size: ${THUNDER_CACHE_SIZE}
          ttl: ${THUNDER_CACHE_TTL}
          eviction_policy: "lru"
          cleanup_interval: 600

        jwt:
          issuer: "${THUNDER_JWT_ISSUER}"
          validity_period: ${THUNDER_JWT_VALIDITY_PERIOD}

        oauth:
          refresh_token:
            renew_on_grant: true
            validity_period: ${THUNDER_OAUTH_REFRESH_TOKEN_VALIDITY}

        flow:
          graph_directory: "repository/resources/graphs"
          max_version_history: 3
          auto_infer_registration: true

        cors:
          allowed_origins:
            - "https://thunder-gate.your-domain.com"
            - "https://localhost:3000"

        consent:
          enabled: ${THUNDER_CONSENT_ENABLED}
          base_url: "${THUNDER_CONSENT_BASE_URL}"
        EOF
        # Generate consent server configuration
        cat > /opt/thunder/consent/repository/conf/deployment.yaml << EOF
        server:
          hostname: "${CONSENT_SERVER_HOSTNAME}"
          port: ${CONSENT_SERVER_PORT}
          readTimeout: 30s
          writeTimeout: 30s
          idleTimeout: 120s

        database:
          consent:
            type: "${CONSENT_DB_TYPE}"
            hostname: "${DATABASE_HOST}"
            port: ${DATABASE_PORT}
            database: "${CONSENT_DB_DATABASE}"
            user: "${CONSENT_DB_USERNAME}"
            password: "${CONSENT_DB_PASSWORD}"
            sslmode: "${CONSENT_DB_SSL_MODE}"

        logging:
          level: info

        consent:
          status_mappings:
            active_status: ACTIVE
            expired_status: EXPIRED
            revoked_status: REVOKED
            created_status: CREATED
            rejected_status: REJECTED
          auth_status_mappings:
            approved_state: APPROVED
            rejected_state: REJECTED
            created_state: CREATED
            system_expired_state: SYS_EXPIRED
            system_revoked_state: SYS_REVOKED
        EOF

        echo "Starting consent server..."
        if [ ! -x /opt/thunder/consent/start.sh ]; then
          echo "Error: consent/start.sh is missing or not executable"
          exit 1
        fi
        (cd /opt/thunder/consent && ./start.sh) &
        CONSENT_PID=$!
        sleep 1
        if ! kill -0 "$CONSENT_PID" 2>/dev/null; then
          echo "Error: Consent server failed to start"
          exit 1
        fi
        echo "Consent server started successfully (PID: $CONSENT_PID)"
        echo "Starting Thunder with PostgreSQL configuration..."
        exec /opt/thunder/thunder
    env:
      - key: THUNDER_SERVER_HOSTNAME
        value: "0.0.0.0"
      - key: THUNDER_SERVER_PORT
        value: "8090"
      - key: THUNDER_GATE_CLIENT_HOSTNAME
        value: "0.0.0.0"
      - key: THUNDER_GATE_CLIENT_PORT
        value: "9090"
      - key: THUNDER_GATE_CLIENT_SCHEME
        value: "https"
      - key: DATABASE_HOST
        value: "<DB_HOST>"
      - key: DATABASE_PORT
        value: "5432"
      - key: THUNDER_DB_CONFIG_TYPE
        value: "postgres"
      - key: THUNDER_DB_CONFIG_DATABASE
        value: "configdb"
      - key: THUNDER_DB_CONFIG_USERNAME
        value: "<DB_USERNAME>"
      - key: THUNDER_DB_CONFIG_PASSWORD
        value: "<DB_PASSWORD>"
      - key: THUNDER_DB_CONFIG_SSL_MODE
        value: "disable"
      - key: THUNDER_DB_RUNTIME_TYPE
        value: "postgres"
      - key: THUNDER_DB_RUNTIME_DATABASE
        value: "runtimedb"
      - key: THUNDER_DB_RUNTIME_USERNAME
        value: "<DB_USERNAME>"
      - key: THUNDER_DB_RUNTIME_PASSWORD
        value: "<DB_PASSWORD>"
      - key: THUNDER_DB_RUNTIME_SSL_MODE
        value: "disable"
      - key: THUNDER_CACHE_TYPE
        value: "memory"
      - key: THUNDER_CACHE_SIZE
        value: "10000"
      - key: THUNDER_CACHE_TTL
        value: "3600"
      - key: THUNDER_JWT_ISSUER
        value: ""
      - key: THUNDER_JWT_VALIDITY_PERIOD
        value: "3600"
      - key: THUNDER_OAUTH_REFRESH_TOKEN_VALIDITY
        value: "86400"
      - key: THUNDER_CRYPTO_ENCRYPTION_KEY
        value: "file://repository/resources/security/crypto.key"
      - key: THUNDER_CONSENT_ENABLED
        value: "true"
      - key: THUNDER_CONSENT_BASE_URL
        value: "http://localhost:9090/api/v1"
      - key: CONSENT_SERVER_HOSTNAME
        value: "localhost"
      - key: CONSENT_SERVER_PORT
        value: "9090"
      - key: CONSENT_DB_TYPE
        value: "postgres"
      - key: CONSENT_DB_DATABASE
        value: "consentdb"
      - key: CONSENT_DB_USERNAME
        value: "<DB_USERNAME>"
      - key: CONSENT_DB_PASSWORD
        value: "<DB_PASSWORD>"
      - key: CONSENT_DB_SSL_MODE
        value: "disable"

  endpoints:
    identity-api:
      type: HTTP
      port: 8090
      visibility:
        - "external"
      basePath: "/"
