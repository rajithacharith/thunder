apiVersion: openchoreo.dev/v1alpha1
kind: Project
metadata:
  name: identity-platform
  annotations:
    openchoreo.dev/description: "Project created by Thunder OpenChoreo Helm chart"
    openchoreo.dev/display-name: "Identity Platform"
spec:
  deploymentPipelineRef:
    name: identity-platform-pipeline
