codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true
    # Wait for exactly 5 coverage uploads before reporting status:
    #   1. backend-unit (from build job)
    #   2. backend-integration-sqlite (from test-integration matrix)
    #   3. backend-integration-postgres (from test-integration matrix)
    #   4. frontend-apps-develop-unit (from upload-frontend-coverage)
    #   5. frontend-apps-gate-unit (from upload-frontend-coverage)
    # Without this, Codecov status checks can intermittently hang at
    # "Expected — Waiting for status to be reported" when CI signal is delayed.
    # See: https://about.codecov.io/blog/delay-notifications-for-flags-with-after_n_builds/
    after_n_builds: 5

flags:
  backend-unit:
    carryforward: false
    paths:
      - backend/
  backend-integration-sqlite:
    carryforward: false
    paths:
      - backend/
  backend-integration-postgres:
    carryforward: false
    paths:
      - backend/
  # backend-combined-sqlite:
  #   carryforward: false
  #   paths:
  #     - backend/
  # backend-combined-postgres:
  #   carryforward: false
  #   paths:
  #     - backend/
  frontend-apps-develop-unit:
    carryforward: false
    paths:
      - frontend/apps/thunder-develop/
  frontend-apps-gate-unit:
    carryforward: false
    paths:
      - frontend/apps/thunder-gate/

coverage:
  status:
    project:
      default:
        enabled: true
        target: auto
        threshold: 1%
        informational: true
      backend-unit:
        flags:
          - backend-unit
        target: auto
        threshold: 1%
        informational: false
      backend-integration:
        flags:
          - backend-integration-sqlite
          - backend-integration-postgres
        target: auto
        threshold: 1%
        informational: false
      # backend-combined:
      #   flags:
      #     - backend-combined-sqlite
      #     - backend-combined-postgres
      #   target: auto
      #   threshold: 1%
      #   informational: false
      frontend-apps-develop-unit:
        flags:
          - frontend-apps-develop-unit
        target: auto
        threshold: 1%
        informational: false
      frontend-apps-gate-unit:
        flags:
          - frontend-apps-gate-unit
        target: auto
        threshold: 1%
        informational: false
    patch:
      default:
        target: 80%
        threshold: 1%
        informational: true

ignore:
  - "backend/tests/**"
  - "**/*_test.go"
  - "tests/**"
  - "samples/**"
  - "docs/**"
  - "api/**"
