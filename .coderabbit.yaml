# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US

reviews:
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  auto_apply_labels: true
  labeling_instructions:
    - label: skip-changelog
      instructions: |
        Apply this label when ALL changed files in the PR are under the `docs/` directory.
        On force-push or re-review, re-apply this label if the condition is still met.
        Remove this label only if ALL of the following are true:
          1. Non-docs files are present in the PR.
          2. The label was previously applied automatically by CodeRabbit (not added manually by a developer).
        Never remove this label if it was manually added by a developer, regardless of what files are changed.

  path_instructions:
    - path: "**"
      instructions: |
        Scan every changed line for the bare word `thunder`, `Thunder`, or `THUNDER` where it is
        **not** immediately followed by `id`, `Id`, or `ID` (i.e., it is not part of `thunderid`,
        `ThunderID`, or `THUNDERID`).
        Flag every such occurrence as a **blocking issue** using this format:

        "đź”´ **Incorrect product name**: `<term>` must be `ThunderID` (or the appropriate template
        placeholder for the file type). Bare `thunder`/`Thunder`/`THUNDER` is not an accepted
        short form of the product name."

        Do **not** flag:
        - Import paths or package names (e.g., `@thunderid/...`, `thunder-id/...`).
        - Code identifiers where `thunder` is a structural prefix followed by `id` in any casing
          (e.g., `RunThunderID`, `thunderid`, `thunderId`).
        - Fenced code blocks that show literal terminal output or configuration values where
          the exact string is semantically required.

        This check applies to every file type: `.go`, `.ts`, `.tsx`, `.mdx`, `.md`, `.yaml`,
        `.toml`, `.json`, `.sh`, and any other text file.

    - path: "**/*.go"
      instructions: |
        Scan for hardcoded occurrences of the string literals `Thunder` or `ThunderID` in this file.
        For each occurrence, flag it and ask: **"Is this hardcoded brand name intentional?"**
        If it can be replaced, suggest using a named constant or a value sourced from runtime config
        (e.g., an environment variable or a config struct field) rather than a raw string literal.
        Do not flag occurrences inside comments or import paths.

        Check whether this change introduces or modifies any of the following:
        - Public REST/OAuth2/OIDC API endpoints (new routes, changed request/response schemas, new query/path/header parameters)
        - Configuration options (YAML/TOML keys, environment variables, deployment settings)
        - Authentication or authorization flows (new grant types, new authenticators, changed flow steps)
        - User-facing behavior changes (new features, changed defaults, removed capabilities)
        - SDK-impacting changes (new or changed client-facing interfaces, token formats, scopes)

        If ANY of the above are detected and the PR does NOT include corresponding updates
        under `docs/` (content pages in `docs/content/`, API references in `docs/content/apis.mdx`,
        guide updates in `docs/content/guides/`, or SDK docs in `docs/content/sdks/`),
        post a **single consolidated PR-level comment** (do NOT create separate inline comments for each gap).
        Collect all missing documentation items across the entire PR and emit them together in one comment
        using the following format:

        "đź”´ **Documentation Required**
        This PR introduces user-facing changes that are not covered by documentation updates under `docs/`.
        Please update the relevant documentation before merging.

        **Missing documentation:**
        - <item 1>: <what needs to be documented and which file to update or create>
        - <item 2>: <what needs to be documented and which file to update or create>
        - ..."

    - path: "**/*.ts"
      instructions: |
        Scan for hardcoded occurrences of the string literals `Thunder` or `ThunderID` in this file.
        For each occurrence, flag it and ask: **"Is this hardcoded brand name intentional?"**
        If it can be replaced, suggest reading the value from the app's config system using the
        `useConfig` hook (e.g., `const { productName } = useConfig();`) rather than a raw string literal.
        Do not flag occurrences inside comments, type names, or import paths.

    - path: "**/*.tsx"
      instructions: |
        Scan for hardcoded occurrences of the string literals `Thunder` or `ThunderID` in this file.
        For each occurrence, flag it and ask: **"Is this hardcoded brand name intentional?"**
        If it can be replaced, suggest reading the value from the app's config system using the
        `useConfig` hook (e.g., `const { productName } = useConfig();`) rather than a raw string literal.
        For JSX string content, prefer the `<ProductName />` component if it is available in this context.
        Do not flag occurrences inside comments, type names, or import paths.

    - path: "frontend/apps/**/*.{ts,tsx}"
      instructions: |
        Monaco editor guidance. Feature components must import the editor directly from
        `@monaco-editor/react` (and editor types from `monaco-editor`). Do NOT introduce or import an
        app-local Monaco wrapper module, and do NOT call `loader.config(...)` or assign
        `self.MonacoEnvironment` outside the host app's `src/lib/monaco-setup.ts` â€” worker/loader
        setup belongs only there. Keeping feature code free of host internals is what allows it to be
        extracted into a standalone `@thunderid/configure-*` package.

        `@monaco-editor/react` loads Monaco from the jsDelivr CDN until `monaco-setup` runs, which
        breaks offline / air-gapped and strict-CSP deployments. In the app router (e.g. `App.tsx`),
        any `lazy(() => import(...))` for a page that renders a Monaco editor MUST be chained through
        `import('./lib/monaco-setup').then(() => import(...the page...))`. Flag a plain
        `lazy(() => import('...Page'))` for a Monaco-rendering page as a CDN-regression risk and ask
        for the `monaco-setup` gate.

    - path: "docs/**"
      instructions: |
        Scan for hardcoded occurrences of the string literals `Thunder` or `ThunderID`.
        Flag every occurrence as a **major issue** and require it to be replaced using the
        correct templating mechanism for the file type (described below).
        Do not flag occurrences inside fenced code blocks that demonstrate real terminal output
        or literal configuration values where the exact string is semantically required.

        **Correct approach by file type:**

        `.mdx` files â€” prose, headings, and JSX string content:
        - Product name â†’ `<ProductName />` (globally registered MDX component, no import needed).
        - Repository URLs and GitHub links â†’ `<RepoLink path="/issues">link text</RepoLink>`.

        `.mdx` files â€” frontmatter fields (title, description, sidebar_label, etc.):
        - Product name â†’ `{{ProductName}}` placeholder (replaced at build time via `parseFrontMatter`).
        - Product slug â†’ `{{productSlug}}` placeholder.

        `.mdx` files â€” fenced code blocks and inline code spans:
        - Product name â†’ `{{ProductName}}` placeholder (replaced at build time by the `rehypeProductName` plugin).
        - Product slug â†’ `{{productSlug}}` placeholder.

        `.tsx` / `.ts` files under `docs/src/`:
        - Read the product name and repo URL from Docusaurus site config:
          ```ts
          const { siteConfig } = useDocusaurusContext();
          const { project } = siteConfig.customFields?.product as DocusaurusProductConfig;
          const productName = project.name;          // product name string
          const repoUrl = project.source.github.url; // repo URL string
          ```
        - Do not hardcode the product name as a string literal; always derive it from config.
          In JSX output, prefer the `<ProductName />` component (import from `@site/src/components/ProductName`).
        - Flag any raw HTML element (`<div>`, `<span>`, `<p>`, `<button>`, `<a>`, `<ul>`, `<li>`, etc.)
          that could be replaced by a `@wso2/oxygen-ui` component. Ask:
          **"Should this use an Oxygen UI component instead of raw HTML?"**
          Common replacements: `<div>` â†’ `<Box>`, `<p>` â†’ `<Typography>`, `<button>` â†’ `<Button>`,
          `<span>` â†’ `<Box component="span">`.
          Exception: SVG diagram elements (`<svg>`, `<rect>`, `<path>`, `<text>`, etc.) are exempt
          from this specific Oxygen UI check.
        - Flag hand-built SVG diagrams (components composed of `<svg>`, `<rect>`, `<path>`, `<text>`,
          etc. used to render an architecture, flow, or sequence diagram) as a **major issue** and ask:
          **"Should this diagram use Mermaid instead of raw SVG?"**
          Only accept raw SVG when the diagram requires a layout Mermaid cannot express.
        - Flag any icon import from a library other than `@wso2/oxygen-ui-icons-react` as a **major issue**.
          Generic UI icons must come from `@wso2/oxygen-ui-icons-react` (a Lucide React wrapper).
          Custom brand or technology logos under `docs/src/components/icons/` are exempt.
        - Flag inline `style={{...}}` props. Styling must use the `sx` prop or `styled()` from
          `@wso2/oxygen-ui`. Prefer `sx`; use `styled()` only when `sx` alone is insufficient
          (e.g., complex descendant selectors, keyframe animations).
        - Flag any new CSS added to `docs/src/css/custom.css` unless it targets Scalar API reference
          elements or other third-party components where `sx`/`styled()` cannot reach. Ask:
          **"Can this style be applied via `sx` or `styled()` instead?"**

        Review documentation changes for:
        - Technical accuracy: do code examples and parameter descriptions match the actual implementation in this PR?
        - Completeness: are all new endpoints, config keys, and behavioral changes covered?
        - Consistency: does the style match existing documentation?
        - Broken links or references to renamed/removed entities.

  auto_review:
    enabled: true
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
    base_branches:
      - main

  path_filters:
    - "!**/*_mock.go"
    - "!**/mock_*.go"
    - "!**/*.pb.go"
    - "!**/node_modules/**"
    - "!docs/__backup__/**"
